name: Deploy to Alibaba Cloud VPS

on:
  push:
    branches:
      - main

jobs:
  build-and-deploy:
    name: Build and Deploy
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: reno-nextjs-app/package-lock.json

      - name: Install Dependencies
        working-directory: reno-nextjs-app
        run: npm ci

      - name: Build Application
        working-directory: reno-nextjs-app
        run: npm run build

      - name: Prepare Deployment Files
        run: |
          mkdir -p deploy/.next
          
          STANDALONE_DIR="reno-nextjs-app/.next/standalone"
          if [ -f "$STANDALONE_DIR/server.js" ]; then
            # Use /. instead of /* to include hidden dirs like .next
            cp -r $STANDALONE_DIR/. deploy/
          elif [ -f "$STANDALONE_DIR/reno-nextjs-app/server.js" ]; then
            cp -r $STANDALONE_DIR/reno-nextjs-app/. deploy/
            [ -d "$STANDALONE_DIR/node_modules" ] && cp -r $STANDALONE_DIR/node_modules deploy/
          fi

          cp -r reno-nextjs-app/.next/static deploy/.next/static
          cp -r reno-nextjs-app/public deploy/public
          
          # Compress to a single file to speed up transfer
          tar -czf release.tar.gz -C deploy .

      - name: Deploy to VPS via SSH
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USERNAME }}
          password: ${{ secrets.SSH_PASSWORD }}
          source: "release.tar.gz"
          target: "~/reno-deploy"

      - name: Restart PM2 on VPS
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USERNAME }}
          password: ${{ secrets.SSH_PASSWORD }}
          script: |
            set -e
            cd ~/reno-deploy
            
            # Extract the archive
            tar -xzf release.tar.gz
            rm release.tar.gz
            
            # Set env vars so Next.js listens on all interfaces
            export HOSTNAME=0.0.0.0
            export PORT=3000
            export NEXT_PUBLIC_BASE_URL=http://${{ secrets.SSH_HOST }}:3000
            
            # Restart the app
            if pm2 describe reno-app > /dev/null 2>&1; then
              pm2 reload reno-app --update-env --time
            else
              PORT=3000 HOSTNAME=0.0.0.0 pm2 start server.js --name "reno-app" --time
            fi
            echo "✅ Deployment complete!"

