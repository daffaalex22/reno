name: Deploy to Alibaba Cloud VPS

on:
  push:
    branches:
      - main

jobs:
  build-and-deploy:
    name: Build and Deploy
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: reno-nextjs-app/package-lock.json

      - name: Install Dependencies
        working-directory: reno-nextjs-app
        run: npm ci

      - name: Build Application
        working-directory: reno-nextjs-app
        env:
          # Stable encryption key so server action IDs survive across builds.
          # Without this, every deploy breaks mobile users with cached pages.
          NEXT_SERVER_ACTIONS_ENCRYPTION_KEY: ${{ secrets.NEXT_SERVER_ACTIONS_ENCRYPTION_KEY }}
        run: npm run build

      - name: Prepare Deployment Files
        run: |
          mkdir -p deploy/.next
          
          STANDALONE_DIR="reno-nextjs-app/.next/standalone"
          if [ -f "$STANDALONE_DIR/server.js" ]; then
            # Use /. instead of /* to include hidden dirs like .next
            cp -r $STANDALONE_DIR/. deploy/
          elif [ -f "$STANDALONE_DIR/reno-nextjs-app/server.js" ]; then
            cp -r $STANDALONE_DIR/reno-nextjs-app/. deploy/
            [ -d "$STANDALONE_DIR/node_modules" ] && cp -r $STANDALONE_DIR/node_modules deploy/
          fi

          cp -r reno-nextjs-app/.next/static deploy/.next/static
          cp -r reno-nextjs-app/public deploy/public
          
          # Compress to a single file to speed up transfer
          tar -czf release.tar.gz -C deploy .

      - name: Deploy to VPS via SSH
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USERNAME }}
          password: ${{ secrets.SSH_PASSWORD }}
          source: "release.tar.gz"
          target: "~/reno-deploy"

      - name: Restart PM2 on VPS
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USERNAME }}
          password: ${{ secrets.SSH_PASSWORD }}
          script: |
            set -e
            cd ~/reno-deploy
            
            # Extract the archive
            tar -xzf release.tar.gz
            rm release.tar.gz
            
            # Ensure ffmpeg is installed
            if ! command -v ffmpeg > /dev/null 2>&1; then
              echo "Installing ffmpeg..."
              sudo apt-get update && sudo apt-get install -y ffmpeg
            fi
            
            # Write PM2 ecosystem config so env vars persist across restarts
            cat > ecosystem.config.cjs << 'EOF'
            module.exports = {
              apps: [{
                name: "reno-app",
                script: "server.js",
                env: {
                  PORT: 3000,
                  HOSTNAME: "0.0.0.0",
                  NEXT_PUBLIC_BASE_URL: "${{ secrets.SITE_URL }}",
                },
              }],
            };
            EOF
            
            # Restart the app using ecosystem config
            if pm2 describe reno-app > /dev/null 2>&1; then
              pm2 reload ecosystem.config.cjs --update-env --time
            else
              pm2 start ecosystem.config.cjs --time
            fi
            pm2 save
            echo "✅ Deployment complete!"

